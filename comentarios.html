<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comentários</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        form {
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
        }
        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .comentario {
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .nome {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Deixe seu comentário!</h1>
    
    <form id="formComentario">
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" placeholder="Seu nome" required><br><br>
        
        <label for="comentario">Comentário:</label><br>
        <textarea id="comentario" placeholder="Digite seu comentário" required></textarea><br><br>
        
        <button type="button" onclick="salvarComentario()">Enviar Comentário</button>
    </form>

    <h2>Comentários:</h2>
    <div id="comentariosList"></div>

    <script>
        // Função para salvar comentário no localStorage
        function salvarComentario() {
            // Pega os valores dos campos
            const nome = document.getElementById('nome').value;
            const comentario = document.getElementById('comentario').value;

            if (nome && comentario) {
                // Cria um objeto com o nome e o comentário
                const comentarioObj = {
                    nome: nome,
                    comentario: comentario
                };

                // Pega os comentários armazenados ou cria um array vazio
                let comentarios = JSON.parse(localStorage.getItem('comentarios')) || [];

                // Adiciona o novo comentário
                comentarios.push(comentarioObj);

                // Salva no localStorage
                localStorage.setItem('comentarios', JSON.stringify(comentarios));

                // Limpa os campos do formulário
                document.getElementById('formComentario').reset();

                // Exibe os comentários
                exibirComentarios();
            } else {
                alert("Por favor, preencha todos os campos.");
            }
        }

        // Função para exibir os comentários
        function exibirComentarios() {
            // Pega os comentários armazenados
            let comentarios = JSON.parse(localStorage.getItem('comentarios')) || [];
            let lista = document.getElementById('comentariosList');
            lista.innerHTML = "";  // Limpa a lista antes de exibir novamente

            // Exibe cada comentário
            comentarios.forEach(comentario => {
                let div = document.createElement('div');
                div.classList.add('comentario');

                let nome = document.createElement('p');
                nome.classList.add('nome');
                nome.textContent = comentario.nome;

                let textoComentario = document.createElement('p');
                textoComentario.textContent = comentario.comentario;

                div.appendChild(nome);
                div.appendChild(textoComentario);
                lista.appendChild(div);
            });
        }

        // Chama a função para exibir os comentários ao carregar a página
        window.onload = exibirComentarios;
    </script>
</body>
</html>
